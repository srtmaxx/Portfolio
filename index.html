  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0
:root{--bg:#0e0e0e;--paper:#141414;--line:#2a2a2a;--accent:#ff0000;--text:#e8e4db;--muted:#6b6760;--serif:'DM Serif Display',Georgia,serif;--mono:'DM Mono','Courier New',monospace}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.5}
.wrapper{max-width:960px;margin:0 auto;padding:60px 40px 100px;position:relative;z-index:1}

/* HEADER */
header{display:grid;grid-template-columns:1fr 180px;gap:40px;align-items:end;border-bottom:1px solid var(--line);padding-bottom:48px;margin-bottom:64px;animation:fadeUp .8s ease both}
.header-text{display:flex;flex-direction:column;gap:12px}
.eyebrow{font-size:11px;font-weight:500;letter-spacing:.25em;text-transform:uppercase;color:var(--accent)}
h1.name{font-family:var(--serif);font-size:clamp(48px,8vw,80px);font-weight:400;line-height:.95}
h1.name em{font-style:italic;color:var(--accent)}
.tagline{font-size:13px;color:var(--muted);letter-spacing:.05em;margin-top:4px}
.contact-chip{display:inline-flex;align-items:center;gap:8px;background:var(--paper);border:1px solid var(--line);border-radius:999px;padding:6px 16px;font-size:12px;color:var(--muted);margin-top:16px;width:fit-content;text-decoration:none;transition:border-color .2s,color .2s}
.contact-chip:hover{border-color:var(--accent);color:var(--accent)}
.contact-chip::before{content:'✉';font-size:11px}
.photo-frame{position:relative;width:180px;height:220px}
.photo-frame::before{content:'';position:absolute;inset:-8px -8px 8px 8px;border:1px solid var(--accent);border-radius:4px;z-index:0}
.photo-frame img{position:relative;z-index:1;width:100%;height:100%;object-fit:cover;border-radius:4px;filter:grayscale(10%) contrast(1.05)}
.photo-placeholder{position:relative;z-index:1;width:100%;height:100%;background:var(--paper);border:1px solid var(--line);border-radius:4px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--muted);font-size:11px;letter-spacing:.1em}
.photo-placeholder .icon{font-size:32px;opacity:.4}

/* SECTION LABEL */
.section-label{display:flex;align-items:center;gap:12px;margin-bottom:36px}
.section-label span{font-size:10px;font-weight:500;letter-spacing:.3em;text-transform:uppercase;color:var(--muted)}
.section-label::after{content:'';flex:1;height:1px;background:var(--line)}

/* GRID */
.projects-section{margin-bottom:64px;animation:fadeUp .8s .15s ease both}
.projects-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}
.project-card{position:relative;overflow:hidden;aspect-ratio:4/3;cursor:pointer;background:var(--paper);display:block;border:none;padding:0;outline:none}
.project-card.featured{grid-column:1/-1;aspect-ratio:16/6}
.project-card img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .7s cubic-bezier(.25,.46,.45,.94),filter .7s;filter:grayscale(30%) brightness(.85);pointer-events:none}
.project-card:hover img{transform:scale(1.08);filter:grayscale(0%) brightness(1.05)}
.project-card::after{content:'';position:absolute;inset:0;background:linear-gradient(115deg,transparent 40%,rgba(255,0,0,.07) 50%,transparent 60%);transform:translateX(-100%);pointer-events:none;z-index:3;transition:transform 0s}
.project-card:hover::after{transform:translateX(100%);transition:transform .6s ease}
.b-top,.b-bot{position:absolute;left:0;right:0;height:2px;background:var(--accent);z-index:4;transform:scaleX(0);transition:transform .4s cubic-bezier(.25,.46,.45,.94)}
.b-top{top:0;transform-origin:left}
.b-bot{bottom:0;transform-origin:right}
.project-card:hover .b-top,.project-card:hover .b-bot{transform:scaleX(1)}
.project-strip{position:absolute;bottom:0;left:0;right:0;padding:12px 16px;background:linear-gradient(to top,rgba(0,0,0,.75),transparent);display:flex;align-items:flex-end;justify-content:space-between;z-index:1;transition:opacity .3s;pointer-events:none}
.project-card:hover .project-strip{opacity:0}
.proj-name{font-family:var(--serif);font-size:15px;font-weight:400;color:#fff;line-height:1.2}
.project-card.featured .proj-name{font-size:24px}
.proj-stats{display:flex;gap:10px;font-size:10px;color:rgba(255,255,255,.5);white-space:nowrap}
.project-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.92) 0%,rgba(0,0,0,.3) 45%,transparent 100%);opacity:0;transition:opacity .45s;display:flex;flex-direction:column;justify-content:flex-end;padding:24px;z-index:2;pointer-events:none}
.project-card:hover .project-overlay{opacity:1}
.ov-tag{display:inline-block;background:rgba(255,0,0,.15);color:var(--accent);border:1px solid rgba(255,0,0,.3);font-size:9px;letter-spacing:.15em;text-transform:uppercase;padding:3px 8px;border-radius:2px;margin-bottom:8px;width:fit-content;transform:translateY(12px);opacity:0;transition:transform .35s .05s ease,opacity .35s .05s ease}
.ov-title{font-family:var(--serif);font-size:18px;color:#fff;line-height:1.2;transform:translateY(14px);opacity:0;transition:transform .35s .1s ease,opacity .35s .1s ease}
.project-card.featured .ov-title{font-size:26px}
.ov-cta{display:inline-flex;align-items:center;gap:6px;background:var(--accent);color:#0e0e0e;font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;padding:8px 16px;border-radius:2px;margin-top:12px;width:fit-content;transform:translateY(14px);opacity:0;transition:transform .35s .16s ease,opacity .35s .16s ease}
.project-card:hover .ov-tag,.project-card:hover .ov-title,.project-card:hover .ov-cta{transform:translateY(0);opacity:1}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .4s ease}
.lightbox.open{opacity:1;pointer-events:all}
.lb-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(6px)}
.lb-panel{position:relative;z-index:1;width:min(92vw,980px);max-height:92vh;background:var(--paper);border:1px solid var(--line);border-radius:4px;overflow:hidden;display:flex;flex-direction:column;transform:translateY(32px) scale(.97);transition:transform .4s cubic-bezier(.25,.46,.45,.94)}
.lightbox.open .lb-panel{transform:translateY(0) scale(1)}
.lb-close{position:absolute;top:20px;right:20px;z-index:10;background:var(--bg);border:1px solid var(--line);color:var(--muted);width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .2s,color .2s;font-family:var(--mono)}
.lb-close:hover{border-color:var(--accent);color:var(--accent)}
.lb-hero{width:100%;aspect-ratio:16/7;overflow:hidden;flex-shrink:0}
.lb-hero img{width:100%;height:100%;object-fit:cover;display:block}
.lb-body{overflow-y:auto;padding:36px 40px 48px;scrollbar-width:thin;scrollbar-color:var(--line) transparent}
.lb-meta{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.lb-tag{background:rgba(255,0,0,.12);color:var(--accent);border:1px solid rgba(255,0,0,.3);font-size:9px;letter-spacing:.2em;text-transform:uppercase;padding:4px 10px;border-radius:2px}
.lb-date{font-size:11px;color:var(--muted)}
.lb-title{font-family:var(--serif);font-size:clamp(28px,4vw,44px);font-weight:400;line-height:1;margin-bottom:20px;color:var(--text)}
.lb-desc{font-size:13px;line-height:1.8;color:#a09c95;max-width:680px;margin-bottom:36px;border-left:2px solid var(--accent);padding-left:20px}
.lb-images{display:flex;flex-direction:column;gap:3px}
.lb-images img{width:100%;display:block;border-radius:2px}
.lb-images-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.lb-footer{display:flex;align-items:center;justify-content:space-between;padding-top:28px;margin-top:36px;border-top:1px solid var(--line)}
.lb-stats{display:flex;gap:20px;font-size:12px;color:var(--muted)}
.lb-behance{display:inline-flex;align-items:center;gap:8px;background:transparent;border:1px solid var(--line);color:var(--muted);font-family:var(--mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;padding:8px 16px;border-radius:2px;text-decoration:none;transition:border-color .2s,color .2s}
.lb-behance:hover{border-color:var(--accent);color:var(--accent)}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);z-index:10;background:var(--bg);border:1px solid var(--line);color:var(--muted);width:40px;height:40px;border-radius:50%;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .2s,color .2s;font-family:var(--mono)}
.lb-nav:hover{border-color:var(--accent);color:var(--accent)}
.lb-prev{left:-20px}
.lb-next{right:-20px}

/* LINKS */
.links-section{margin-bottom:64px;animation:fadeUp .8s .25s ease both}
.links-grid{display:flex;gap:16px;flex-wrap:wrap}
.link-card{display:flex;align-items:center;gap:12px;background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:16px 20px;text-decoration:none;color:var(--text);font-size:13px;transition:border-color .2s,transform .2s,background .2s;flex:1;min-width:200px}
.link-card:hover{border-color:var(--accent);background:#1a1a14;transform:translateY(-2px)}
.link-icon{width:36px;height:36px;border-radius:6px;background:var(--line);display:flex;align-items:center;justify-content:center;font-size:16px}
.link-name{font-weight:500;letter-spacing:.05em}
.link-handle{font-size:11px;color:var(--muted)}
.link-arrow{margin-left:auto;color:var(--muted);font-size:16px;transition:transform .2s,color .2s}
.link-card:hover .link-arrow{transform:translate(3px,-3px);color:var(--accent)}

footer{border-top:1px solid var(--line);padding-top:28px;display:flex;justify-content:space-between;align-items:center;animation:fadeUp .8s .35s ease both}
footer p{font-size:11px;color:var(--muted);letter-spacing:.1em}
.footer-dot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}}

@media(max-width:700px){
  .wrapper{padding:40px 20px 80px}
  header{grid-template-columns:1fr}
  .photo-frame{width:120px;height:150px}
  .projects-grid{grid-template-columns:1fr 1fr}
  .project-card.featured{grid-column:1/-1;aspect-ratio:16/7}
  .lb-panel{width:98vw;max-height:96vh}
  .lb-body{padding:24px 20px 36px}
  .lb-images-grid{grid-template-columns:1fr}
  .lb-prev{left:8px}.lb-next{right:8px}
}
</style>

function openProject(id) {

  container.innerHTML = '';

    container.className = p.images.length > 1 ? 'lb-images lb-images-grid' : 'lb-images';

      img.src = p.images[i];
      img.loading = 'lazy';
      img.alt = p.title + ' ' + (i + 1);
      if (p.images.length > 1 && i === 0) img.style.gridColumn = '1/-1';
      container.appendChild(img);
    }
  }
}

}

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Projet — Maxime Romieu, designer graphique et directeur artistique.">
  <title>Projet | Maxime Romieu</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
  .burger{display:none;flex-direction:column;justify-content:space-between;width:28px;height:18px;background:none;border:none;cursor:pointer;padding:0;z-index:101}
  .burger span{display:block;width:100%;height:1px;background:#fff;transition:transform .35s cubic-bezier(.16,1,.3,1),opacity .25s,width .35s}
  .burger.active span:nth-child(1){transform:translateY(8.5px) rotate(45deg)}
  .burger.active span:nth-child(2){opacity:0;width:0}
  .burger.active span:nth-child(3){transform:translateY(-8.5px) rotate(-45deg)}
  .mobile-menu{position:fixed;inset:0;z-index:99;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;opacity:0;transform:translateY(-12px);transition:opacity .4s cubic-bezier(.16,1,.3,1),transform .4s cubic-bezier(.16,1,.3,1)}
  .mobile-menu.open{opacity:1;transform:translateY(0);pointer-events:all}
  .mobile-links{list-style:none;display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:48px}
  .mobile-link{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,14vw,5.5rem);line-height:1;letter-spacing:.04em;color:#fff;text-decoration:none;display:block;transition:color .25s}
  .mobile-link:hover{color:#8b2fc9}
  .mobile-cta{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:#000;background:#fff;padding:14px 32px;text-decoration:none;transition:background .3s,color .3s}
  .mobile-cta:hover{background:#8b2fc9;color:#fff}
  @media(max-width:768px){
    .nav-projet-links{display:none}
    .btn-behance{display:none}
    .burger{display:flex}
  }
  </style>
</head>
<body>

  <nav class="nav-projet">
    <a href="index.html" class="nav-logo-projet">
      <img src="SVG/logo.svg" alt="Maxime Romieu" class="nav-logo-img-projet">
    </a>
    <ul class="nav-projet-links">
      <li><a href="index.html#work">Projets</a></li>
      <li><a href="a-propos.html">À propos</a></li>
      <li><a href="index.html#contact">Contact</a></li>
    </ul>
    <button class="burger" id="burger" aria-label="Menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </nav>
  <div class="mobile-menu" id="mobile-menu" aria-hidden="true">
    <ul class="mobile-links">
      <li><a href="index.html#work" class="mobile-link">Projets</a></li>
      <li><a href="a-propos.html" class="mobile-link">À propos</a></li>
      <li><a href="index.html#contact" class="mobile-link">Contact</a></li>
    </ul>
    <a href="#" id="mobile-behance" class="mobile-cta" target="_blank" rel="noopener">Voir Behance</a>
  </div>

  <main id="contenu-projet"></main>

  <footer class="footer-global">
    <img src="SVG/logo.svg" alt="Maxime Romieu" class="footer-logo">
    <p>&copy; 2026 Maxime Romieu</p>
  </footer>

  <script src="js/projets.js"></script>
  <script src="js/projet.js"></script>
  <script>
  // Burger menu
  (function(){
    var burger=document.getElementById('burger');
    var menu=document.getElementById('mobile-menu');
    if(!burger||!menu)return;
    function toggleMenu(open){
      burger.classList.toggle('active',open);
      menu.classList.toggle('open',open);
      burger.setAttribute('aria-expanded',open);
      menu.setAttribute('aria-hidden',!open);
      document.body.style.overflow=open?'hidden':'';
    }
    burger.addEventListener('click',function(){toggleMenu(!menu.classList.contains('open'));});
    menu.querySelectorAll('.mobile-link,.mobile-cta').forEach(function(el){
      el.addEventListener('click',function(){toggleMenu(false);});
    });
  })();
  </script>
  <script>
  // Anti-veuves
  (function(){
    function fixWidow(el){
      var w=document.createTreeWalker(el,NodeFilter.SHOW_TEXT);
      var last=null;
      while(w.nextNode())last=w.currentNode;
      if(last)last.textContent=last.textContent.replace(/\s+(\S+)\s*$/,'\u00A0$1');
    }
    document.querySelectorAll('.projet-titre,.projet-description p,.lb-title').forEach(fixWidow);
  })();
  document.addEventListener('contextmenu',function(e){if(e.target.tagName==='IMG')e.preventDefault();});
  document.addEventListener('dragstart',function(e){if(e.target.tagName==='IMG')e.preventDefault();});
  </script>
</body>
</html>
